services:
  pgwatch-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pgwatch-ai
    env_file:
      - .env
    environment:
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    command: ["ask", "check replication lag status"]
    tty: true
    stdin_open: true
networks:
  default:
    external: true
    name: pgwatch_default

